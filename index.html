<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人家計簿 - 雲端同步版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary-color: #4a6fa5; --bg-color: #f8f9fa; }
        body { font-family: sans-serif; background: var(--bg-color); padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .form-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: var(--primary-color); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; }
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>雲端家計簿 (同步中)</h2>
        <div id="status" class="loading">正在連線至雲端試算表...</div>
        <div class="form-group">
            <input type="date" id="dateInput">
            <input type="text" id="itemInput" placeholder="品項">
            <input type="number" id="amountInput" placeholder="金額">
            <select id="categoryInput">
                <option value="車相關">車相關</option><option value="出差報帳">出差報帳</option>
                <option value="個人交際">個人交際</option><option value="生活餐飲">生活餐飲</option>
                <option value="娛樂購物">娛樂購物</option><option value="3C類">3C類</option>
                <option value="3C-串流">3C-串流</option>
            </select>
        </div>
        <button onclick="addRecord()">同步新增至雲端</button>
    </div>

    <div class="card">
        <h3>最近消費 (雲端數據)</h3>
        <table id="recordTable">
            <thead><tr><th>日期</th><th>項目</th><th>金額</th><th>分類</th></tr></thead>
            <tbody id="recordBody"></tbody>
        </table>
    </div>
</div>

<script>
    // ⚠️ 請在此處貼上您的 Google Apps Script 網址
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby0DVBfxq5Ty1nuJMKIBmqTDR1bVdsyHpvQi7grTI7sXeUY_tw530uFUexrc9GIAHa7/exec";

    // 設定今天日期（本地時區，避免跨裝置誤差）
    const today = new Date();
    const dateStr = today.getFullYear() + '-' +
        String(today.getMonth() + 1).padStart(2, '0') + '-' +
        String(today.getDate()).padStart(2, '0');
    document.getElementById('dateInput').value = dateStr;
    let records = [];

    async function fetchRecords() {
        document.getElementById('status').innerText = "讀取雲端資料中...";
        try {
            const response = await fetch(SCRIPT_URL);
            records = await response.json();
            renderTable();
            document.getElementById('status').innerText = "雲端同步已就緒";
        } catch (e) {
            document.getElementById('status').innerText = "讀取失敗，請檢查網址";
        }
    }

    async function addRecord() {
        const data = {
            date: document.getElementById('dateInput').value,
            item: document.getElementById('itemInput').value,
            amount: document.getElementById('amountInput').value,
            category: document.getElementById('categoryInput').value
        };

        document.getElementById('status').innerText = "同步寫入中...";
        // mode: 'no-cors' 確保手機瀏覽器也能正常送出資料至 Google Apps Script
        await fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(data)
        });
        
        document.getElementById('itemInput').value = '';
        document.getElementById('amountInput').value = '';
        fetchRecords();
    }

    function renderTable() {
        const body = document.getElementById('recordBody');
        body.innerHTML = '';
        records.slice().reverse().slice(0, 10).forEach(r => {
            const row = `<tr><td>${r.date.split('T')[0]}</td><td>${r.item}</td><td>${r.amount}</td><td>${r.category}</td></tr>`;
            body.innerHTML += row;
        });
    }

    fetchRecords();
</script>
</body>
</html>
